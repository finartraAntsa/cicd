[pytest]
# `.pytest_cache` (and even temporary cache dirs) are not accessible in this
# workspace, which triggers `PytestCacheWarning` on each run. Disable the cache
# provider to keep test output clean and avoid permission issues.
addopts = -p no:cacheprovider

# Pytest cache temp dirs can get left behind with restrictive ACLs; avoid
# recursing into them during collection.
norecursedirs = .pytest_cache .pytest_cache_local pytest-cache-files-*
